<input class="w-full pl-12 pr-4 py-3 bg-surface-container-lowest border border-outline rounded-lg text-on-surface placeholder:text-on-surface-variant focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all shadow-sm" placeholder="搜尋店家名稱或地點..." type="text"/>

<div class="grid grid-cols-1 md:grid-cols-2 gap-md">

<div>

</div>
</div>
